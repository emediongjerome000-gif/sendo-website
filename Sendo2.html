<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sendo | Logistics</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
        <link rel="stylesheet" href="Sendo2.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    </head>

    <body>
        <header class="logo-section">
            <div class="navbar">
                <h1 class="logo">
                    Sendo
                </h1>

                <nav>
                    <a href="#Home">Home</a>
                    <a href="#Services">Services</a>
                    <a href="#Resources">Resources</a>
                    <a href="#About">About</a>
                </nav>
            </div>

            <div class="icons">
                <i class="fa-solid fa-bell" id="notification" title="Notifications"></i>
                <i class="fa-solid fa-user" id="user" title="User Profile"></i>
            </div>
        </header>

        <div class="splash-screen">
            <div class="overlay">
                    <h1>Download Our App</h1>
                    <h2> Refined, seamless delivery</h2>
                    <p>Smart delivery designed to keep up with your modern <br>lifestyle_ fast, reliable, and seamless.</p>

                    <div class="button">
                        <div class="apple">
                            <i class="fa-brands fa-apple"></i>
                            App Store
                        </div>

                        <div class="google">
                            <img src="img/image16.png" alt="playstore logo" width="50" height="50">
                            Google Play
                        </div>
                    </div>
            </div>
        </div>
        <script src="Sendo.js"></script>
    </body>
</html>
