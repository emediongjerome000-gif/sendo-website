<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sendo | Logistics</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
        <link rel="stylesheet" href="Sendo.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    </head>

    <body onload="setTimeout(()=>window.location=''Sendo1.html',5000)">
        <header class="logo-section">
            <div class="navbar">
                <h1 class="logo">
                    Sendo
                </h1>

                <nav>
                    <a href="#Home">Home</a>
                    <a href="#Services">Services</a>
                    <a href="#Resources">Resources</a>
                    <a href="#About">About</a>
                </nav>
            </div>

            <div class="icons">
                <i class="fa-solid fa-bell" id="notification" title="Notifications"></i>
                <i class="fa-solid fa-user" id="user" title="User Profile"></i>
            </div>
        </header>

        <div class="splash-screen">
            <div class="overlay">
                <span class="sendo">SENDO</span>
                <p>Reliable&bull;Affordable&bull;Everywhere</p>
            </div>
        </div>

        <script>
            setTimeout(function(){
                window.location.href = "Sendo1.html";
            },5000);
        </script>
        
        <script src="index.js"></script>
    </body>
</html>
